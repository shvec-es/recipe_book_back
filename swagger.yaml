openapi: 3.0.0
info:
  title: Recipes App API
  version: 1.0.0
  description: API для веб-додатку з рецептами. Дозволяє керувати профілем, рецептами та категоріями.

servers:
  - url: https://recipe-book-back.onrender.com/api

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken

paths:
  /auth/register:
    post:
      summary: Реєстрація нового користувача
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                  example: 'Mariia'
                email:
                  type: string
                  example: 'test@example.com'
                password:
                  type: string
                  example: 'password123'
      responses:
        201:
          description: Користувача успішно створено
        400:
          description: Помилка валідації

  /auth/login:
    post:
      summary: Авторизація користувача
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Успішний вхід, токени встановлено в Cookies
        400:
          description: Помилка валідації

  /auth/refresh:
    post:
      summary: Оновлення сесії користувача
      tags: [Auth]
      responses:
        200:
          description: Сесію успішно оновлено
        401:
          description: Сесія не знайдена або термін дії токена вийшов

  /auth/logout:
    post:
      summary: Вихід із системи
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        204:
          description: Успішний вихід, куки очищено
        401:
          description: Неавторизовано

  /recipes:
    get:
      summary: Отримання списку всіх рецептів
      tags: [Recipes]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: perPage
          schema:
            type: integer
            default: 10
        - in: query
          name: category
          schema:
            type: string
          description: ID категорії для фільтрації
      responses:
        200:
          description: Список рецептів отримано успішно

    post:
      summary: Створення нового рецепту
      tags: [Recipes]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: 'Смачна яєшня'
                category:
                  type: string
                  description: ID категорії
                description:
                  type: string
                  example: 'Як приготувати блюдо'
                ingredients:
                  type: string
                  description: JSON рядок або масив інгредієнтів
                image:
                  type: string
                  format: binary # Це поле для вибору файлу в інтерфейсі
      responses:
        201:
          description: Рецепт створено
        401:
          description: Неавторизовано

  /recipes/{recipeId}:
    get:
      summary: Отримання одного рецепту за ID
      tags: [Recipes]
      parameters:
        - in: path
          name: recipeId
          required: true
          schema:
            type: string
      responses:
        200:
          description: Дані рецепту
        404:
          description: Рецепт не знайдено

    patch:
      summary: Оновлення рецепту
      tags: [Recipes]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: recipeId
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                image:
                  type: string
                  format: binary
      responses:
        200:
          description: Рецепт оновлено
        404:
          description: Рецепт не знайдено

    delete:
      summary: Видалення рецепту за ID
      tags: [Recipes]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: recipeId
          required: true
          schema:
            type: string
      responses:
        200:
          description: Рецепт успішно видалено
        404:
          description: Рецепт не знайдено

  /categories:
    get:
      summary: Отримання списку всіх категорій
      tags: [Categories]
      responses:
        200:
          description: Список категорій отримано успішно

  /users/me:
    get:
      summary: Отримання даних поточного користувача
      tags: [Users]
      security:
        - cookieAuth: []
      responses:
        200:
          description: Дані профілю отримано
        401:
          description: Неавторизовано

    patch:
      summary: Оновлення профілю користувача (ім'я, аватар)
      tags: [Users]
      security:
        - cookieAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: 'Mariia New Name'
                avatar:
                  type: string
                  format: binary
      responses:
        200:
          description: Профіль оновлено
        401:
          description: Неавторизовано

  /users/{userId}:
    get:
      summary: Отримання публічної інформації про автора
      tags: [Users]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        200:
          description: Публічні дані автора
        404:
          description: Користувача не знайдено

  /users/{userId}/recipes:
    get:
      summary: Отримання всіх рецептів конкретного автора
      tags: [Users]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: perPage
          schema:
            type: integer
            default: 10
      responses:
        200:
          description: Список рецептів автора отримано
